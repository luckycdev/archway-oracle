services:
  server:
    build:
      context: .
      args:
        SERVER_PORT: ${SERVER_PORT:-8501}
    environment:
      SERVER_PORT: ${SERVER_PORT:-8501}
      PROCESSED_STREAM_BIND_HOST: ${PROCESSED_STREAM_BIND_HOST:-0.0.0.0}
      PROCESSED_STREAM_PUBLIC_HOST: ${PROCESSED_STREAM_PUBLIC_HOST:-127.0.0.1}
      PROCESSED_STREAM_PORT: ${PROCESSED_STREAM_PORT:-8765}
    ports:
      - "${SERVER_PORT:-8501}:${SERVER_PORT:-8501}"
      - "${PROCESSED_STREAM_PORT:-8765}:${PROCESSED_STREAM_PORT:-8765}"


